<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مشروع أيهم – جميع التجارب</title>
<style>
  body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
  .experience { padding: 15px; background: #fff; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
  h1,h2 { margin-bottom: 10px; }
</style>
</head>
<body>

<h1>واجهة مشروع أيهم – جميع التجارب</h1>

<div id="experience-container"></div>

<h2>عرض التجارب في المدونة</h2>
<div id="experience-blog-container"></div>

<script>
// بيانات جميع التجارب 01–05
const experiences = [
  { "title": "تجربة 01 – الذاكرة الرقمية", "result": "تم تحويل تجربة 01 إلى نموذج عملي ومرئي على الواجهة والمدونة." },
  { "title": "تجربة 02 – الترميز الرمزي", "result": "تم تحويل تجربة 02 إلى نموذج مرئي وتحليل بيانات الترميز." },
  { "title": "تجربة 03 – الذكاء الاصطناعي", "result": "تم إنشاء نموذج AI للتجربة 03 لتحليل النتائج." },
  { "title": "تجربة 04 – تحليل السلوك", "result": "تم جمع وتحليل بيانات السلوك في تجربة 04." },
  { "title": "تجربة 05 – التنبؤ المستقبلي", "result": "تم بناء نموذج تنبؤ لتجربة 05 على أساس البيانات السابقة." }
];

// عرض البيانات في واجهة AYHEM_WEB
const container = document.getElementById('experience-container');
experiences.forEach(exp => {
  const div = document.createElement('div');
  div.className = 'experience';
  div.innerText = `${exp.title}: ${exp.result}`;
  container.appendChild(div);
});

// عرض البيانات في المدونة
const blogContainer = document.getElementById('experience-blog-container');
experiences.forEach(exp => {
  const div = document.createElement('div');
  div.className = 'experience';
  div.innerText = `${exp.title}: ${exp.result}`;
  blogContainer.appendChild(div);
});
</script>

</body>
</html>
